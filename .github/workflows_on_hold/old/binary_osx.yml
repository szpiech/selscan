name: C++ CI Test Binary (OSX)
on:
  push:
    branches:
      - bug_low_mac
  pull_request:
    branches:
      - bug_low_mac

jobs:
  build:
    runs-on: macos-13
    if: (contains(github.event.head_commit.message, '[testbin]'))

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test selscan installation
      working-directory: bin/osx/
      run: |
        ./selscan --help
        ./norm --help

